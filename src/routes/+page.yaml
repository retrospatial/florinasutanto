intro:
  title: hi! i'm flo
  desc: Intro
  text: >
    Welcome to my site! Here you'll find a cross between my work portfolio and a collection of my personal projects, hobbies, and interests.


    As an interactive engineer, I create data-driven visual stories for topics in research, data journalism, and digital humanities.


    I enjoy writing, drinking fruit juices, searching for clues, being airborne, and noodling underwater. When allowed, I will bug you about doing parkour, watching Buffy, and trying out niche sports. 


    This site is perpetually under construction and things might change or disappear all the time. In the meantime, I hope you have fun perambulating its various corners!


    I am originally from Bogor, Indonesia and now based in Cambridge, MA.

#     Among other things, I am interested in using incisive storytelling, visual explorations, and novel data to reveal new truths about how we interact with this world and each other.

