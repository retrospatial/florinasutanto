intro:
  title: data x graphics x stories
  text: >
    I am an interactive engineer making stories and graphics with data. I enjoy writing for topics in media, research, data journalism, and digital humanities.


    Here you'll find a cross between my work portfolio and a collection of my personal projects, hobbies, and interests. 


    You can always catch me thinking about: parkour, Buffy, scuba diving, fruit juices, bodies of water, and the Wiskayok HS girls' soccer team.


    I am originally from Bogor, Indonesia and now based in Cambridge, MA.

