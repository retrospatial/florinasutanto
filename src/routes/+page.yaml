about_short:
  title: hi! i'm flo
  desc: About Me
  text: >
    I am a creative data storyteller and developer. Among other things, I am interested in using incisive storytelling, visual explorations, and novel data to reveal new truths about how we interact with this world and each other. 


    I create data-driven stories and interactive digital experiences for topics in research, data journalism, and digital humanities. Currently, I work as an Interactive Engineer at <a href="https://www.citizencodex.com/" target="_blank" rel="noopener noreferrer">Citizen Codex</a>, a data innovation studio.


    This site is a cross between a professional portfolio and one of many personal corners of the internet. It is and will always be under construction—I say that with delight! I love tinkering with little websites and styling them by hand.


    I am originally from Bogor, Indonesia and now based in Cambridge, MA.

